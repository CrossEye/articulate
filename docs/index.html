<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Articulate Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Articulate',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: 'auto',
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script>
    // Convert + back to %20 in markdown link URLs so Docsify can fetch files
    // whose names contain spaces.  Source files use + for readable URLs.
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function (hook) {
      hook.beforeEach(function (content) {
        return content
          .replace(/\]\(([^)]+)\)/g, function (match, url) {
            return '](' + url.replace(/\+/g, '%20') + ')'
          })
          .replace(/^\[([^\]]+)\]:\s*(.+)$/gm, function (_match, ref, url) {
            return '[' + ref + ']: ' + url.replace(/\+/g, '%20')
          })
      })
    })
  </script>
</body>
</html>
